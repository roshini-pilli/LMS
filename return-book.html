<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Book</title>
    <link rel="stylesheet" href="return-book.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>📗 Return Book</h1>
            <a href="dashboard.html" class="back-btn">← Dashboard</a>
        </div>

        <div class="form-section">

            <h2>Return Book</h2>

            <form>

                <input type="text" placeholder="Student ID" required>

                <input type="text" placeholder="Book Name" required>

                <input type="date" required>

                <input type="number" placeholder="Fine Amount" value="0">

                <button type="submit">Return Book</button>

            </form>

        </div>

        <div class="table-section">

            <h2>Returned Books</h2>

            <table>

                <thead>
                    <tr>
                        <th>Return ID</th>
                        <th>Student ID</th>
                        <th>Book Name</th>
                        <th>Return Date</th>
                        <th>Fine</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>1</td>
                        <td>101</td>
                        <td>Java Programming</td>
                        <td>2026-06-25</td>
                        <td>₹0</td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</body>
</html>
