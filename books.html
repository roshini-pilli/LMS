<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books</title>
    <link rel="stylesheet" href="books.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>📚 Book Management</h1>
            <a href="dashboard.html" class="back-btn">← Dashboard</a>
        </div>

        <!-- Add Book Form -->
        <div class="form-section">
            
            <h2>Add New Book</h2>

            <form onsubmit="addBook(event)">
                <input id="title" type="text" placeholder="Book Title" required>

                <input id="author" type="text" placeholder="Author Name" required>

                <input id="quantity" type="number" placeholder="Quantity" required>

                <button type="submit">Add Book</button>

            </form>

        </div>

        <!-- Search -->
        <div class="search-section">
            <input type="text" placeholder="Search books...">
        </div>

        <!-- Books Table -->
        <div class="table-section">

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Book Name</th>
                        <th>Author</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="bookTableBody">

                </tbody>

            </table>

        </div>

    </div>
    <script src="books.js"></script>
</body>
</html>
