<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Management</title>
    <link rel="stylesheet" href="students.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🎓 Student Management</h1>

        <a href="home.html">
            <button class="back-btn">🏠 Home</button>
        </a>
    </div>

    <!-- Add Student Form -->
    <div class="form-card">

        <h2>Add Student</h2>

        <form onsubmit="addStudent(event)">

            <input
                type="text"
                id="name"
                placeholder="Student Name"
                required>

            <input
                type="text"
                id="rollNo"
                placeholder="Roll Number"
                required>

            <input
                type="text"
                id="department"
                placeholder="Department"
                required>

            <button type="submit">
                Add Student
            </button>

        </form>

    </div>

    <!-- Students Table -->

    <div class="table-card">

        <h2>Student List</h2>

        <table>

            <thead>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Roll No</th>
                <th>Department</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody id="studentTableBody">

            </tbody>

        </table>

    </div>

</div>

<script src="students.js"></script>

</body>

</html>
