<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            📚 LM
        </div>

        <div class="nav-buttons">
            <a href="login.html">
                <button class="login-btn">Login</button>
            </a>

            <a href="signup.html">
                <button class="signup-btn">Sign Up</button>
            </a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Library Management System</h1>
        <p>Manage, Track and Explore Books Easily</p>
    </section>
    <!-- Statistics -->
    <section class="stats">

        <div class="card">
            <div class="icon">📚</div>
            <h2 id="totalBooks">0</h2>
            <p>Total Books</p>
        </div>

        <div class="card">
            <div class="icon">📕</div>
            <h2 id="issuedBooks">0</h2>
            <p>Issued Books</p>
        </div>

        <div class="card">
            <div class="icon">📖</div>
            <h2 id="availableBooks">0</h2>
            <p>Available Books</p>
        </div>

    </section>


  
    <script src="home.js"></script>

</body>
</html>
